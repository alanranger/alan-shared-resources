<!-- Squarespace Product Schema Suppressor v1.3 (Code-Block Safe) -->

<script>
(function(){
  // Remove Squarespace's built-in, short Product JSON-LD
  const removeSquarespaceProduct = () => {
    document.querySelectorAll('script[type="application/ld+json"]').forEach(el => {
      const txt = el.textContent.trim();
      if (txt.includes('"@type":"Product"')) {
        try {
          const j = JSON.parse(txt);
          const looksLikeSquarespace =
            txt.length < 1500 &&
            !j.aggregateRating &&
            !j.review &&
            j.offers &&
            j.name &&
            !txt.includes('"hasMerchantReturnPolicy"');
          if (looksLikeSquarespace) el.remove();
        } catch(e){}
      }
    });
  };
  // Run several times to catch async Squarespace hydration
  removeSquarespaceProduct();
  document.addEventListener('DOMContentLoaded', removeSquarespaceProduct);
  window.addEventListener('load', () => setTimeout(removeSquarespaceProduct, 1000));
  const obs = new MutationObserver(removeSquarespaceProduct);
  obs.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>

<!-- Auto-fetch Product Schema from GitHub and inject inline JSON-LD -->
<script>
(function() {
  const INLINE_FAQ_PAYLOAD = {"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is included in Annual Pick N Mix Subscription | Interest Free Payment Plan?", "acceptedAnswer": {"@type": "Answer", "text": "Annual Pick N Mix Subscription | Interest Free Payment Plan focuses on the content described on this page. Make a one-off payment by bank transfer or through this to get 20% discount on events booked for 12 Months | Tailored Pick N Mix photography training plan"}}, {"@type": "Question", "name": "Is Annual Pick N Mix Subscription | Interest Free Payment Plan suitable for beginners?", "acceptedAnswer": {"@type": "Answer", "text": "Yes, Annual Pick N Mix Subscription | Interest Free Payment Plan is designed to support learners at an early stage, based on the page description and course framing."}}, {"@type": "Question", "name": "What will I learn from Annual Pick N Mix Subscription | Interest Free Payment Plan?", "acceptedAnswer": {"@type": "Answer", "text": "The page describes practical skills, structured guidance, and hands-on learning outcomes aligned to Annual Pick N Mix Subscription | Interest Free Payment Plan."}}, {"@type": "Question", "name": "What should I bring or prepare for Annual Pick N Mix Subscription | Interest Free Payment Plan?", "acceptedAnswer": {"@type": "Answer", "text": "Prepare your camera kit and review the page details before attending, so you can apply the techniques covered in Annual Pick N Mix Subscription | Interest Free Payment Plan."}}, {"@type": "Question", "name": "Who is Annual Pick N Mix Subscription | Interest Free Payment Plan best suited for?", "acceptedAnswer": {"@type": "Answer", "text": "Annual Pick N Mix Subscription | Interest Free Payment Plan is best suited to photographers who want clearer guidance and practical next steps based on the topic covered on this page."}}], "@id": "https://www.alanranger.com/photography-services-near-me/annual-pick-n-mix-subscription#faq"};

  function appendJsonLd(payload) {
    if (!payload || typeof payload !== "object") return;
    const s = document.createElement("script");
    s.type = "application/ld+json";
    s.text = JSON.stringify(payload);
    document.head.appendChild(s);
  }

  function hasExistingFaqSignal() {
    const schemaBlocks = Array.from(document.querySelectorAll('script[type="application/ld+json"]'));
    const hasFaqSchema = schemaBlocks.some((block) => /"@type"\s*:\s*"FAQPage"/i.test(block.textContent || ""));
    if (hasFaqSchema) return true;
    // Skip only if another script (not this one) already loads an FAQ JSON endpoint.
    const currentScript = document.currentScript;
    const scriptBlocks = Array.from(document.querySelectorAll("script"))
      .filter((block) => block !== currentScript);
    return scriptBlocks.some((block) => /\/[a-z0-9._\-/]*_faq\.json(?:["'?#&]|$)/i.test(String(block.textContent || "") + " " + String(block.src || "")));
  }

  function hasExistingTldrSignal() {
    if (document.getElementById("ar-tldr-block")) return true;
    const headings = Array.from(document.querySelectorAll("h1,h2,h3,h4"));
    return headings.some((h) => /(^|\s)(tl;?dr|tldr|summary|quick answer)(\s|$)/i.test(String(h.textContent || "")));
  }

  function injectTldrBlock(summaryText) {
    if (hasExistingTldrSignal()) return;
    const summary = String(summaryText || "").replace(/\s+/g, " ").trim();
    if (summary.length < 40) return;

    const container = document.querySelector("main, article, .Main-content, #content, .sqs-block-content") || document.body;
    if (!container) return;

    const block = document.createElement("section");
    block.id = "ar-tldr-block";
    block.style.margin = "1rem 0";
    block.style.padding = "0.85rem 1rem";
    block.style.border = "1px solid #dbe3ec";
    block.style.borderRadius = "8px";
    block.style.background = "#f8fbff";

    const title = document.createElement("h2");
    title.textContent = "TLDR";
    title.style.margin = "0 0 0.45rem 0";
    title.style.fontSize = "1rem";

    const body = document.createElement("p");
    body.textContent = summary;
    body.style.margin = "0";
    body.style.lineHeight = "1.55";

    block.appendChild(title);
    block.appendChild(body);

    const firstHeading = container.querySelector("h1, h2");
    if (firstHeading && firstHeading.parentNode) {
      firstHeading.parentNode.insertBefore(block, firstHeading.nextSibling);
      return;
    }
    if (container.firstChild) {
      container.insertBefore(block, container.firstChild);
    } else {
      container.appendChild(block);
    }
  }

  fetch("https://schema.alanranger.com/annual-pick-n-mix-subscription-interest-free-payment-plan_schema.json")
    .then((r) => r.ok ? r.json() : null)
    .then((json) => {
      if (!json) return;
      appendJsonLd(json);
      injectTldrBlock(json.description || json.name || "");

      if (!INLINE_FAQ_PAYLOAD) return;
      const faqType = String(INLINE_FAQ_PAYLOAD?.["@type"] || "").toLowerCase();
      if (faqType !== "faqpage") return;
      if (hasExistingFaqSignal()) return;
      appendJsonLd(INLINE_FAQ_PAYLOAD);
    })
    .catch(console.error);
})();
</script>
